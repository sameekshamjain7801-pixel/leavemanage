<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeaveFlow | Forgot Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #0045cc;
            --primary-hover: #0038a8;
            --bg-body: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #64748b;
        }
        body {
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f8fafc;
            color: var(--text-main);
            padding: 2rem;
        }
        .forgot-card {
            width: 100%;
            max-width: 400px;
            background: white;
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.03);
            text-align: center;
        }
        .card-header { margin-bottom: 2rem; }
        .card-header h2 { font-size: 1.8rem; font-weight: 800; color: #0f172a; margin-bottom: 0.5rem; }
        .card-header p { color: #64748b; font-size: 0.95rem; line-height: 1.5; }

        .form-label { display: block; font-weight: 600; font-size: 0.9rem; margin-bottom: 0.6rem; color: #334155; text-align: left; }
        .input-group { position: relative; margin-bottom: 1.5rem; }
        .input-group i.left-icon { position: absolute; left: 1.25rem; top: 50%; transform: translateY(-50%); color: #94a3b8; font-size: 1.2rem; }
        .input-group input {
            width: 100%;
            padding: 1rem 1.25rem 1rem 3.5rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 14px;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.2s;
        }
        .input-group input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 4px rgba(0, 69, 204, 0.1); }

        .btn-submit {
            width: 100%;
            padding: 1.1rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 1.5rem;
        }
        .btn-submit:hover { background: var(--primary-hover); transform: translateY(-2px); }

        .back-link {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: color 0.2s;
        }
        .back-link:hover { color: var(--primary); }
    </style>
</head>

<body>
    <div class="forgot-card">
        <div class="card-header">
            <h2>Forgot Password</h2>
            <p>Enter your ID to receive password reset instructions.</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="alert alert-{{ category }} py-2 small mb-4" style="border-radius: 10px; padding: 1rem; text-align: center;">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form action="{{ url_for('auth.process_forgot_password') }}" method="POST">
            <label class="form-label">User ID / Faculty ID</label>
            <div class="input-group">
                <i class="bi bi-person left-icon"></i>
                <input type="text" name="faculty_id" placeholder="Enter your ID" required>
            </div>

            <button type="submit" class="btn-submit">Send Request <i class="bi bi-send"></i></button>
        </form>

        <a href="{{ url_for('auth.login') }}" class="back-link">
            <i class="bi bi-arrow-left"></i> Back to Login
        </a>
    </div>
</body>

</html>
